
<body>
  <div class="bg-overlay"></div>


<div class="auth-wrapper">
  <div class="form-card">
    <h2>Add Workout 🏋️</h2>

    <form #workoutForm="ngForm" (ngSubmit)="addWorkout()">
      
      <div class="form-group">
        <label>Workout Type</label>
        <select name="type" [(ngModel)]="workout.type" style="color: black;" required>
          <option value="" disabled selected>Select activity</option>
          <option value="Running">Running</option>
          <option value="Walking">Walking</option>
          <option value="Cycling">Cycling</option>
          <option value="Swimming">Swimming</option>
          <option value="Weightlifting">Weightlifting</option>
          <option value="Yoga">Yoga</option>
        </select>
      </div>

      <div class="stats-grid">
        <div class="form-group">
          <label>Duration (mins)</label>
          <input type="number" name="duration" [(ngModel)]="workout.duration" required placeholder="0">
        </div>
        <div class="form-group">
          <label>Calories Burned</label>
          <input type="number" name="caloriesBurned" [(ngModel)]="workout.caloriesBurned" required placeholder="0">
        </div>
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" [(ngModel)]="workout.date" required>
      </div>

      <button type="submit" class="primary-btn" [disabled]="workoutForm.invalid">
        Log Workout
      </button>

    </form>
  </div>
</div>
</body>


<body>
  
  <div class="bg-overlay"></div>



<div class="dashboard">
  <div class="log-container glass">
    <div class="header-row">
      <h2 style="color: antiquewhite;">Meal History 🍽️</h2>
      <button class="primary-btn small-btn" routerLink="/add-meal">+ Add Meal</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Meal Name</th>
            <th>Type</th>
            <th>Calories</th>
            <th>Protein</th>
            <th>Carbs</th>
            <th>Fats</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let meal of meals">
            <td>{{ meal.date | date:'MMM d, y' }}</td>
            <td class="meal-name">{{ meal.name }}</td>
            <td><span class="type-badge">{{ meal.mealType }}</span></td>
            <td class="highlight">{{ meal.calories }} kcal</td>
            <td>{{ meal.protein }}g</td>
            <td>{{ meal.carbs }}g</td>
            <td>{{ meal.fats }}g</td>
          </tr>
          <tr *ngIf="meals.length === 0">
            <td colspan="7" class="empty-msg">No meals logged yet. Start eating healthy!</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
